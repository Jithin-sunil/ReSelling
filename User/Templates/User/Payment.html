<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
}

/* Card */
.pay-card{
    background:#000;
    padding:35px;
    border-radius:15px;
    border:2px solid #fe5b29;
    color:#fff;
    box-shadow:0 0 20px rgba(254,91,41,0.5);
}

/* Title */
.payment-title{
    text-align:center;
}

/* Inputs */
.text-box{
    width:200px;
    border:1px solid #fe5b29;
    padding:10px;
    border-radius:8px;
    background:#111;
    color:#fff;
}

/* Payment button */
.button-pay{
    background:#fe5b29;
    padding:12px 40px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    color:#000;
}

.button-pay:hover{
    box-shadow:0 0 12px rgba(254,91,41,0.8);
}

/* Card icons */
.payment-icons i{
    margin:10px;
}

/* Total text */
.total-text{
    color:#fe5b29;
    font-weight:600;
}

</style>

</head>

<body>

<form action="" method="post">
{% csrf_token %}

<table align="center" style="margin-top:100px;">

<tr>
<td>

<div class="pay-card">

<table>

<tr>
<td align="center" class="payment-title">

<i class="fa fa-credit-card" style="font-size:36px;color:#fe5b29"></i>

<br>

<b style="font-size:40px;color:#fe5b29">Payment</b>

</td>
</tr>

<tr>
<td>

<div style="padding-top:30px">

<table cellspacing="15">

<tr>
<td>Card No:</td>

<td colspan="3">
<input type="text"
id="credit-card"
required
autocomplete="off"
placeholder="XXXX XXXX XXXX XXXX"
title="Enter Correct Card Number"
maxlength="19"
name="txtacno"
class="text-box">
</td>
</tr>

<tr>
<td>Name</td>

<td colspan="3">
<input type="text"
name="txtname"
required
autocomplete="off"
pattern="[a-zA-z ]{3,15}"
title="Enter Correct Name"
minlength="3"
placeholder="Name"
class="text-box">
</td>
</tr>

<tr>
<td>Exp Date</td>

<td>
<input
id="credit-card-exp"
type="text"
name="txtexpdate"
required
autocomplete="off"
placeholder="MM/YY"
pattern="[0-9/]{5,5}"
title="Enter Correct Date"
maxlength="5"
class="text-box"
style="width:80px">

<span id="datecheck"></span>
</td>

<td>CVV</td>

<td>
<input
type="text"
id="credit-card-ccv"
name="txtccv"
required
autocomplete="off"
placeholder="XXX"
pattern="[0-9]{3,3}"
maxlength="3"
class="text-box"
style="width:70px">
</td>
</tr>

<tr>
<td>Total</td>

<td class="total-text">
₹ {{amount.booking_amount}}
</td>
</tr>

<tr>
<td colspan="4" align="center">

<input
type="submit"
value="Make Payment"
class="button-pay">

</td>
</tr>

</table>

</div>

</td>
</tr>

<tr>
<td align="center" class="payment-icons">

<i class="fa fa-cc-visa" style="font-size:40px;color:white"></i>
<i class="fa fa-cc-paypal" style="font-size:40px;color:#fe5b29"></i>
<i class="fa fa-cc-mastercard" style="font-size:40px;color:#fe5b29"></i>

</td>
</tr>

</table>

</div>

</td>
</tr>

</table>

</form>

{% if msg %}
<script>
alert("{{msg}}")
window.location = "{% url 'User:Homepage' %}"
</script>
{% endif %}

</body>
</html>
