{% extends 'User/Header.html' %}
{% load static %}
{% block content %}

<style>

body{
    background:#111;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

/* Title */
.page-title{
    text-align:center;
    color:#fff;
    margin:30px 0;
}

/* Gallery container */
.gallery-container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* Gallery card */
.gallery-card{
    background:#000;
    padding:10px;
    border-radius:10px;
    border:2px solid #fe5b29;
    box-shadow:0 0 10px rgba(254,91,41,0.4);
}

/* Images */
.gallery-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:6px;
}

</style>


<h2 class="page-title">Vehicle Gallery</h2>

<div class="gallery-container">

{% for i in gallery %}

<div class="gallery-card">
<img src="{{i.gallery_photo.url}}">
</div>

{% endfor %}

</div>

{% endblock content %}
