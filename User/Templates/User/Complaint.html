{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
    color:#fff;
}

/* Wrapper */
.complaint-wrapper{
    width:80%;
    margin:auto;
    padding:50px 0;
}

/* Form Card */
.complaint-card{
    background:#000;
    border:2px solid #fe5b29;
    border-radius:12px;
    padding:30px;
    margin-bottom:40px;
    box-shadow:0 0 20px rgba(254,91,41,0.2);
}

/* Tables */
.complaint-table{
    width:100%;
    border-collapse:collapse;
}

/* Table Header */
.complaint-table th{
    background:#fe5b29;
    color:#000;
    padding:12px;
    text-align:center;
}

/* Table Cells */
.complaint-table td{
    border:1px solid #fe5b29;
    padding:12px;
    text-align:center;
}

/* Labels */
.form-label{
    color:#fe5b29;
    font-weight:600;
}

/* Inputs */
.form-input{
    width:100%;
    padding:8px 12px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Submit Button */
.submit-btn{
    background:#fe5b29;
    color:#000;
    padding:8px 25px;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    box-shadow:0 5px 15px rgba(254,91,41,0.4);
}

</style>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint</title>
</head>
<body>
    <div class="complaint-wrapper">

<form action="" method="post">
{% csrf_token %}

<div class="complaint-card">

<table class="complaint-table">

<tr>
<td class="form-label">Title</td>
<td><input required type="text" name="txt_title" class="form-input"></td>
</tr>

<tr>
<td class="form-label">Content</td>
<td><input required type="text" name="txt_Content" class="form-input"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit" class="submit-btn">
</td>
</tr>

</table>

</div>

<table class="complaint-table">

<tr>
<th>SNo</th>
<th>Title</th>
<th>Content</th>
<th>Reply</th>
</tr>

{% for i in complaintdata %}
<tr>
<td>{{forloop.counter}}</td>
<td>{{i.complaint_title}}</td>
<td>{{i.complaint_content}}</td>
<td>{{i.complaint_reply}}</td>
</tr>
{% endfor %}

</table>

</form>

</div>
    
</body>
</html>
{% endblock content %}
