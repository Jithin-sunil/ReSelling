
{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
    color:#fff;
}

/* Wrapper */
.edit-wrapper{
    display:flex;
    justify-content:center;
    padding:60px 0;
}

/* Card */
.edit-card{
    width:500px;
    background:#000;
    border:2px solid #fe5b29;
    border-radius:12px;
    padding:35px;
    box-shadow:0 0 20px rgba(254,91,41,0.25);
}

/* Title */
.edit-title{
    text-align:center;
    margin-bottom:25px;
    color:#ffffff;
}

/* Table */
.edit-table{
    width:100%;
    border-collapse:collapse;
}

/* Labels */
.edit-label{
    color:#fe5b29;
    font-weight:600;
    padding:12px;
}

/* Inputs */
.edit-input{
    width:100%;
    padding:8px 12px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Button */
.update-btn{
    background:#fe5b29;
    color:#000;
    padding:10px 30px;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.update-btn:hover{
    box-shadow:0 5px 15px rgba(254,91,41,0.4);
}

</style>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
</head>
<body>
<div class="edit-wrapper">

<form action="" method="post">
{% csrf_token %}

<div class="edit-card">

<h2 class="edit-title">Edit Profile</h2>

<table class="edit-table">

<tr>
<td class="edit-label">Name</td>
<td>
<input required type="text" name="txt_name" value="{{UserpData.user_name}}" class="edit-input">
</td>
</tr>

<tr>
<td class="edit-label">Contact</td>
<td>
<input required type="text" name="txt_contact" value="{{UserpData.user_contact}}" class="edit-input">
</td>
</tr>

<tr>
<td class="edit-label">Address</td>
<td>
<input required type="text" name="txt_address" value="{{UserpData.user_address}}" class="edit-input">
</td>
</tr>

<tr>
<td colspan="2" align="center" style="padding-top:20px;">
<input type="submit" value="Update" class="update-btn">
</td>
</tr>

</table>

</div>

</form>

</div>
    
</body>
</html>
{% endblock content %}
