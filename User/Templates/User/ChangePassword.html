{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
    color:#fff;
}

/* Wrapper */
.password-wrapper{
    display:flex;
    justify-content:center;
    padding:60px 0;
}

/* Card */
.password-card{
    width:500px;
    background:#000;
    border:2px solid #fe5b29;
    border-radius:12px;
    padding:35px;
    box-shadow:0 0 20px rgba(254,91,41,0.25);
}

/* Title */
.password-title{
    text-align:center;
    margin-bottom:25px;
    color:#ffffff;
}

/* Table */
.password-table{
    width:100%;
    border-collapse:collapse;
}

/* Labels */
.password-label{
    color:#fe5b29;
    font-weight:600;
    padding:12px;
}

/* Inputs */
.password-input{
    width:100%;
    padding:8px 12px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Buttons */
.password-btn{
    background:#fe5b29;
    color:#000;
    padding:10px 25px;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
    margin:5px;
}

.password-btn:hover{
    box-shadow:0 5px 15px rgba(254,91,41,0.4);
}

/* Cancel button */
.reset-btn{
    background:#444;
    color:#fff;
}

</style>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangePassword</title>
</head>
<body>
    <div class="password-wrapper">

<form action="" method="post">
{% csrf_token %}

<div class="password-card">

<h2 class="password-title">Change Password</h2>

<table class="password-table">

<tr>
<td class="password-label">Current Password</td>
<td>
<input required type="text" name="txt_CurrentPassword" class="password-input">
</td>
</tr>

<tr>
<td class="password-label">New Password</td>
<td>
<input required type="text"
name="txt_NewPassword"
class="password-input"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
</td>
</tr>

<tr>
<td class="password-label">Confirm Password</td>
<td>
<input required type="text" name="txt_ConfirmPassword" class="password-input">
</td>
</tr>

<tr>
<td colspan="2" align="center" style="padding-top:20px;">
<input type="submit" value="Change Password" class="password-btn">
<input type="reset" value="Cancel" class="password-btn reset-btn">
</td>
</tr>

</table>

</div>

</form>

</div>

    {% if msg %}
    <script>
        alert('{{msg}}')
        window.location = "{% url 'User:UserProfile' %}"
    </script>
    {% endif %}
</body>
</html>
{% endblock content %}
