{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Amount</title>
</head>
<body>
    <form action="" method="post">
         {% csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Token Amount</td>
                <td>{{amount.booking_amount}}</td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Pay"></td>
            </tr>
        </table>
    </form>
</body>
</html>
{% endblock content %}
