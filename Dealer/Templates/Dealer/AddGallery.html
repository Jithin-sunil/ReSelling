{% extends 'Dealer/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Gallery</title>

<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
}

/* Card */
.gallery-card{
    width:600px;
    margin:40px auto;
    background:#000;
    padding:25px;
    border-radius:12px;
    border:2px solid #fe5b29;
    box-shadow:0 0 20px rgba(254,91,41,0.4);
}

/* Title */
.gallery-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:20px;
}

/* Table */
.gallery-table{
    width:100%;
    border-collapse:collapse;
    color:#fff;
}

/* Table cells */
.gallery-table td{
    padding:10px;
    border-bottom:1px solid rgba(254,91,41,0.4);
}

/* Header row */
.gallery-table th{
    background:#fe5b29;
    color:#000;
    padding:10px;
}

/* File input */
.file-upload{
    width:100%;
    border:1px solid #fe5b29;
    border-radius:6px;
    background:#111;
    padding:6px;
}

.file-upload input[type="file"]{
    color:#fff;
}

/* Buttons */
.gallery-btn{
    padding:8px 16px;
    background:#fe5b29;
    color:#000;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.gallery-btn:hover{
    box-shadow:0 0 10px rgba(254,91,41,0.8);
}

/* Delete button */
.delete-btn{
    background:#dc3545;
    color:#fff;
    padding:6px 12px;
    border-radius:5px;
    text-decoration:none;
}

/* Images */
.gallery-table img{
    width:150px;
    border-radius:6px;
    border:2px solid #fe5b29;
}

</style>

</head>

<body>

<form action="" method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="gallery-card">

<h2 class="gallery-title">Vehicle Gallery</h2>

<table class="gallery-table">

<tr>
<td>Photo</td>
<td>
<div class="file-upload">
<input required type="file" name="img_photo">
</div>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input class="gallery-btn" type="submit" value="Submit">
</td>
</tr>

</table>

<br>

<table class="gallery-table">

<tr>
<th>SNO</th>
<th>Photo</th>
<th>Action</th>
</tr>

{%for i in gallerydata%}

<tr>
<td>{{forloop.counter}}</td>

<td>
<img src="{{ i.gallery_photo.url }}">
</td>

<td>
<a class="delete-btn"
href="{% url 'Dealer:delAddGallery' i.id %}">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</form>

{% if msg %}
<script>
alert('{{msg}}')
window.location = "{% url 'Dealer:MyVehicles' %}"
</script>
{% endif %}

</body>
</html>
{% endblock content %}
