{% extends 'Dealer/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
}

/* Card */
.password-card{
    width:500px;
    margin:60px auto;
    background:#000;
    padding:35px;
    border-radius:15px;
    border:2px solid #fe5b29;

    box-shadow:
        0 0 15px rgba(254,91,41,0.6),
        0 0 30px rgba(254,91,41,0.3);
}

/* Title */
.password-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:25px;
}

/* Table */
.password-table{
    width:100%;
    border-collapse:collapse;
    color:#fff;
}

/* Cells */
.password-table td{
    padding:12px;
    border-bottom:1px solid rgba(254,91,41,0.4);
}

/* Labels */
.password-label{
    color:#fe5b29;
    font-weight:600;
    width:40%;
}

/* Inputs */
.password-input{
    width:100%;
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Buttons */
.password-btn{
    padding:10px 20px;
    background:#fe5b29;
    color:#000;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.password-btn:hover{
    box-shadow:0 0 12px rgba(254,91,41,0.8);
}

/* Cancel button */
.reset-btn{
    background:#333;
    color:#fff;
}

</style>

</head>

<body>

<form action="" method="post">
{% csrf_token %}

<div class="password-card">

<h2 class="password-title">Change Password</h2>

<table class="password-table">

<tr>
<td class="password-label">Current Password</td>
<td>
<input class="password-input" required type="password" name="txt_CurrentPassword">
</td>
</tr>

<tr>
<td class="password-label">New Password</td>
<td>
<input class="password-input" required type="password" name="txt_NewPassword"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
</td>
</tr>

<tr>
<td class="password-label">Confirm Password</td>
<td>
<input class="password-input" required type="password" name="txt_ConfirmPassword">
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input class="password-btn" type="submit" value="Change Password">
<input class="password-btn reset-btn" type="reset" value="Cancel">
</td>
</tr>

</table>

</div>

</form>

{% if msg %}
<script>
alert('{{msg}}')
window.location = "{% url 'Dealer:DealerProfile' %}"
</script>
{% endif %}

</body>
</html>
{% endblock content %}
