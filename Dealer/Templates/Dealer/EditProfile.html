{% extends 'Dealer/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
}

/* Card */
.edit-card{
    width:500px;
    margin:60px auto;
    background:#000;
    padding:35px;
    border-radius:15px;
    border:2px solid #fe5b29;

    box-shadow:
        0 0 15px rgba(254,91,41,0.6),
        0 0 30px rgba(254,91,41,0.3);
}

/* Title */
.edit-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:25px;
}

/* Table */
.edit-table{
    width:100%;
    border-collapse:collapse;
    color:#fff;
}

/* Cells */
.edit-table td{
    padding:12px;
    border-bottom:1px solid rgba(254,91,41,0.4);
}

/* Labels */
.edit-label{
    color:#fe5b29;
    font-weight:600;
    width:40%;
}

/* Inputs */
.edit-input{
    width:100%;
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Button */
.edit-btn{
    padding:10px 20px;
    background:#fe5b29;
    color:#000;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.edit-btn:hover{
    box-shadow:0 0 12px rgba(254,91,41,0.8);
}

</style>
</head>

<body>

<form action="" method="post">
{% csrf_token %}

<div class="edit-card">

<h2 class="edit-title">Edit Profile</h2>

<table class="edit-table">

<tr>
<td class="edit-label">Name</td>
<td>
<input  class="edit-input" required type="text" name="txt_name" value="{{dealerpData.dealer_name}}">
</td>
</tr>

<tr>
<td class="edit-label">Contact</td>
<td>
<input class="edit-input" required type="text" name="txt_contact" value="{{dealerpData.dealer_contact}}">
</td>
</tr>

<tr>
<td class="edit-label">Address</td>
<td>
<input class="edit-input" required type="text" name="txt_address" value="{{dealerpData.dealer_address}}">
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input class="edit-btn" type="submit" value="Update">
</td>
</tr>

</table>

</div>

</form>

</body>
</html>
{% endblock content %}
