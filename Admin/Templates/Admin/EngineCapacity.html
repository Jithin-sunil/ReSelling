{% extends 'Admin/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Capacity</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Engine Capacity</td>
                <td><input required type="text" name="txt_EngineCapacity" value="{{EngineCapacityeditdata.enginecapacity_value}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="submit"></td>

            </tr>
        </table>
        <table border="1" align="center">
            <tr>
                <td>SNO</td>
                <td>Engine Capacity</td>
                <td>Action</td>
            </tr>
            {% for i in EngineCapacity %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{ i.enginecapacity_value }}</td>
                <td><a href="{% url 'Admin:delEngineCapacity' i.id %}">Delete</a>
                <a href="{% url 'Admin:edtEngineCapacity' i.id %}">Edit</a></td>
            </tr>
            {% endfor %}
        </table>
    </form>
</html>
{% endblock content %}
