{% extends 'Admin/Header.html' %}
{% load static %}
{% block content %}

<style>

body{
    background:#111;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

/* Form Card */
.model-card{
    width:450px;
    margin:40px auto;
    background:#000;
    padding:30px;
    border-radius:12px;
    border:2px solid #fe5b29;
    box-shadow:0 0 20px rgba(254,91,41,0.4);
}

/* Title */
.page-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:20px;
}

/* Form Table */
.form-table{
    width:100%;
}

.form-table td{
    padding:10px;
}

/* Inputs */
.input-box, select{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Button */
.submit-btn{
    padding:8px 20px;
    border:none;
    border-radius:6px;
    background:#fe5b29;
    color:#000;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    box-shadow:0 0 10px rgba(254,91,41,0.8);
}

/* Data Table */
.list-table{
    width:60%;
    margin:40px auto;
    border-collapse:collapse;
}

.list-table th{
    background:#fe5b29;
    color:#000;
    padding:10px;
}

.list-table td{
    padding:10px;
    border-bottom:1px solid rgba(254,91,41,0.4);
    text-align:center;
}

/* Action Links */
.action-link{
    color:#fe5b29;
    text-decoration:none;
    font-weight:600;
    margin:0 5px;
}

.action-link:hover{
    text-decoration:underline;
}

</style>


<form action="" method="post">
{% csrf_token %}

<div class="model-card">

<h2 class="page-title">Model Name</h2>

<table class="form-table">

<tr>
<td>Company</td>
<td>

<select required name="sel_company">

<option value="">...select company...</option>

{% for i in companydata %}

<option
{% if i.id == modeleditdata.company.id %}
selected
{% endif %}
value="{{i.id}}">

{{i.company_name}}

</option>

{% endfor %}

</select>

</td>
</tr>

<tr>
<td>Model Name</td>
<td>
<input required class="input-box" type="text"
name="txt_ModelName"
value="{{modeleditdata.model_name}}">
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input   class="submit-btn" type="submit" value="Submit">
</td>
</tr>

</table>

</div>


<table class="list-table">

<tr>
<th>Sl.no</th>
<th>Company</th>
<th>Model Name</th>
<th>Action</th>
</tr>

{% for i in ModelName %}

<tr>
<td>{{forloop.counter}}</td>
<td>{{i.company.company_name}}</td>
<td>{{i.model_name}}</td>

<td>
<a class="action-link" href="{% url 'Admin:delModelName' i.id %}">Delete</a>
<a class="action-link" href="{% url 'Admin:edtModelName' i.id %}">Edit</a>
</td>

</tr>

{% endfor %}

</table>

</form>

{% endblock content %}
