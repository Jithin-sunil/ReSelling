
{% extends 'Admin/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Registration</title>

<style>

body{
    background:#111;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

/* Card */
.admin-card{
    width:500px;
    margin:40px auto;
    background:#000;
    padding:30px;
    border-radius:12px;
    border:2px solid #fe5b29;
    box-shadow:0 0 20px rgba(254,91,41,0.4);
}

/* Title */
.admin-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:20px;
}

/* Table */
.admin-table{
    width:100%;
    border-collapse:collapse;
}

.admin-table td{
    padding:10px;
}

/* Inputs */
.admin-input{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Buttons */
.admin-btn{
    padding:8px 18px;
    border:none;
    border-radius:6px;
    background:#fe5b29;
    color:#000;
    font-weight:600;
    cursor:pointer;
}

.admin-btn:hover{
    box-shadow:0 0 10px rgba(254,91,41,0.8);
}

.reset-btn{
    background:#333;
    color:#fff;
}

/* List Table */
.list-table{
    width:70%;
    margin:40px auto;
    border-collapse:collapse;
    color:#fff;
}

.list-table th{
    background:#fe5b29;
    color:#000;
    padding:10px;
}

.list-table td{
    padding:10px;
    border-bottom:1px solid rgba(254,91,41,0.4);
    text-align:center;
}

/* Action links */
.action-link{
    color:#fe5b29;
    text-decoration:none;
    font-weight:600;
    margin:0 5px;
}

.action-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<form action="" method="post">
{% csrf_token %}
