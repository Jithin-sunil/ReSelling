{% extends 'Admin/Header.html' %}
{% load static %}
{% block content %}

<style>

body{
    background:#111;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

/* Card */
.reply-card{
    width:420px;
    margin:70px auto;
    background:#000;
    padding:30px;
    border-radius:12px;
    border:2px solid #fe5b29;
    box-shadow:0 0 20px rgba(254,91,41,0.4);
}

/* Title */
.page-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:25px;
}

/* Table */
.form-table{
    width:100%;
}

.form-table td{
    padding:10px;
}

/* Input */
.input-box{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Button */
.submit-btn{
    background:#fe5b29;
    color:#000;
    border:none;
    padding:8px 18px;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    box-shadow:0 0 10px rgba(254,91,41,0.8);
}

</style>


<div class="reply-card">

<h2 class="page-title">Reply to Complaint</h2>

<form action="" method="post">
{% csrf_token %}

<table class="form-table">

<tr>
<td>Reply</td>
<td>
<input required class="input-box" type="text" name="txt_reply" required>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input class="submit-btn" type="submit" value="Submit">
</td>
</tr>

</table>

</form>

</div>

{% endblock content %}
