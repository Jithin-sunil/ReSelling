{% extends 'Admin/Header.html' %}
{% load static %}
{% block content %}

<style>

body{
    background:#111;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
}

/* Card */
.password-card{
    width:420px;
    margin:60px auto;
    background:#000;
    padding:30px;
    border-radius:12px;
    border:2px solid #fe5b29;
    box-shadow:0 0 20px rgba(254,91,41,0.4);
}

/* Title */
.page-title{
    text-align:center;
    color:#fe5b29;
    margin-bottom:25px;
}

/* Table */
.form-table{
    width:100%;
}

.form-table td{
    padding:10px;
}

/* Inputs */
.input-box{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #fe5b29;
    background:#111;
    color:#fff;
}

/* Buttons */
.btn-primary{
    background:#fe5b29;
    color:#000;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.btn-secondary{
    background:#444;
    color:#fff;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
}

.btn-primary:hover{
    box-shadow:0 0 10px rgba(254,91,41,0.8);
}

.btn-secondary:hover{
    background:#666;
}

</style>


<div class="password-card">

<h2 class="page-title">Change Password</h2>

<form action="" method="post">
{% csrf_token %}

<table class="form-table">

<tr>
<td>Current Password</td>
<td>
<input required class="input-box"
type="password"
name="txt_CurrentPassword"
required>
</td>
</tr>

<tr>
<td>New Password</td>
<td>
<input required class="input-box"
type="password"
name="txt_NewPassword"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters"
required>
</td>
</tr>

<tr>
<td>Confirm Password</td>
<td>
<input required class="input-box"
type="password"
name="txt_ConfirmPassword"
required>
</td>
</tr>

<tr>
<td colspan="2" align="center">

<input class="btn-primary" style="color: #000;"
type="submit"
value="Change Password">

<input class="btn-secondary"
type="reset"
value="Cancel">

</td>
</tr>

</table>

</form>

</div>


{% if msg %}
<script>
alert('{{msg}}')
window.location = "{% url 'Admin:Homepage' %}"
</script>
{% endif %}

{% endblock content %}
